<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!-- Hidden static form so Netlify's build-time bot detects the fields.
         The real submission happens via fetch() from ContactSupportModal. -->
    <form name="contact-support" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact-support" />
      <input name="bot-field" />
      <select name="reason">
        <option value="Account update">Account update</option>
        <option value="General app questions">General app questions</option>
        <option value="Host application">Host application</option>
        <option value="Report an issue">Report an issue</option>
        <option value="Other">Other</option>
      </select>
      <input type="text" name="name" />
      <input type="text" name="contact" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
